name: cloudflare-config

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  wrangler-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cloudflare files exist
        run: |
          test -f wrangler.jsonc
          test -f src/index.ts
          grep -q '"name"' wrangler.jsonc
