name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site app
        run: pnpm build

      - name: Check runtime helper syntax
        run: node --check packages/core/src/runtime.mjs

      - name: Check core entry syntax
        run: node --check packages/core/src/index.mjs

      - name: Check docs generator syntax
        run: node --check tools/generate-docs.mjs

      - name: Runtime path regression test
        run: node --test packages/core/test/runtime.test.mjs

      - name: Generate docs
        run: node tools/generate-docs.mjs

      - name: Verify generated docs
        run: node tools/check-generated-docs.mjs
