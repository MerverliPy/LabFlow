name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate manifest
        run: pnpm validate:manifest

      - name: Generate docs
        run: pnpm generate:docs

      - name: Verify generated docs
        run: pnpm verify:generated-docs

      - name: Build
        run: pnpm build
      - run: npm pack

      - name: Verify packed install
        run: |
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          npm init -y
          npm install "$GITHUB_WORKSPACE"/labflow-*.tgz
          npx --no-install labflow --help
          npx --no-install labflow doctor
          npx --no-install labflow status --json

      - name: Test
        run: pnpm test

      - name: Proof verify
        run: pnpm proof:verify

      - name: Check shell scripts
        run: pnpm check:shell
