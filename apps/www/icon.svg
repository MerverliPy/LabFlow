    </filter>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#g)"/>
  <rect x="18" y="18" width="220" height="220" rx="44" fill="none" stroke="#66ff66" stroke-opacity=".45" stroke-width="4"/>
  <text x="50%" y="56%" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="88" fill="#66ff66" filter="url(#glow)">LF</text>
</svg>
