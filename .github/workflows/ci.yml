name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate manifest
        run: pnpm validate:manifest

      - name: Generate docs
        run: pnpm generate:docs

      - name: Verify generated docs
        run: pnpm verify:generated-docs

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Proof verify
        run: pnpm proof:verify

      - name: Upload proof artifacts
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ci-proof-results
          path: verification/runs/**

      - name: Check shell scripts
        if: runner.os == 'Linux'
        run: pnpm check:shell

      - name: Release readiness
        run: pnpm release:readiness

      - name: Pack npm tarball
        if: runner.os == 'Linux'
        run: npm pack

      - name: Verify packed install
        if: runner.os == 'Linux'
        shell: bash
        run: |
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          npm init -y
          npm install "$GITHUB_WORKSPACE"/labflow-*.tgz
          npx --no-install labflow --help
          npx --no-install labflow doctor --json
          npx --no-install labflow status --json
