name: Feature request
description: Suggest an improvement to LabFlow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Focus on the problem first, then the proposed change.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any alternatives or tradeoffs you have considered.
  - type: textarea
    id: scope
    attributes:
      label: Affected area
      description: CLI, docs, workflows, website, proof harness, Claude Code pack, or other.
